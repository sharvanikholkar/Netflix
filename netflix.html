<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <title>Netflix Watch Video Everywhere now onwards</title>
</head>
<body>
    <div class="root">
        <nav class="navbar">
           
         <img  class="img-logo" src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Logonetflix.png" alt="">
         
   <div class="nav-buttons"></div>
         <select class="language-btn">
        <option>English</option>
        <option>हिन्दी</option>
        <option>मराठी</option>
    </select>

   

         <div class="btn-sign-in">sign in</div>

    <div class="main-container">

     <div class="email-box">

    </div>
